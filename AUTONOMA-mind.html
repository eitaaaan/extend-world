<script nonce="autonoma-main">
"use strict";
/* ============================================================
   AUTONOMA MIND — 自作AIエージェント(器)
   ・脳=無料の高性能LLMを差し替え自由(Gemini / Groq / OpenRouter / GLM / Cerebras / 任意のOpenAI互換)
   ・長期記憶(localStorage)・人格・Web取り込み(最新情報)を内製
   ・API/TTSキーは保存しない。必要な時だけタブ内メモリで使用
   ============================================================ */
const $ = s => document.querySelector(s);
const logEl = $("#log");
const SECURITY = Object.freeze({
  maxStorageChars: 800000,
  maxTextFileBytes: 1024 * 1024,
  maxImageFileBytes: 4 * 1024 * 1024,
  maxAudioFileBytes: 16 * 1024 * 1024,
  maxFeedItems: 80,
  maxFeedTextChars: 4000,
  maxResponseBytes: 8 * 1024 * 1024,
  persistSecrets: false,
  allowedTextExtensions: new Set(["txt","md","csv","json"]),
  allowedImageMimes: new Set(["image/png","image/jpeg","image/webp","image/gif"]),
  allowedAudioMimes: new Set(["audio/wav","audio/x-wav","audio/mpeg","audio/mp3","audio/webm","audio/ogg"]),
  allowedConnectHosts: new Set([
    "generativelanguage.googleapis.com","api.groq.com","api.cerebras.ai","openrouter.ai","api.z.ai",
    "hacker-news.firebaseio.com","api.wikimedia.org","www.wikidata.org","api.duckduckgo.com",
    "api.github.com","huggingface.co","export.arxiv.org","raw.githubusercontent.com","gist.githubusercontent.com"
  ])
});
function clipText(value, max=4000){ return String(value ?? "").slice(0, max); }
function safeJsonLoad(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    if (raw.length > SECURITY.maxStorageChars) return fallback;
    const parsed = JSON.parse(raw, (k,v)=> (k==="__proto__" || k==="constructor" || k==="prototype") ? undefined : v);
    return parsed == null ? fallback : parsed;
  } catch(e){ return fallback; }
}
function safeGetString(key, max=SECURITY.maxStorageChars){
  try{ return clipText(localStorage.getItem(key) || "", max); } catch(e){ return ""; }
}
function safeStore(key, value){
  try{
    const s = String(value);
    if (s.length > SECURITY.maxStorageChars) { console.warn("localStorage value too large", key); return false; }
    localStorage.setItem(key, s); return true;
  }
  catch(e){ console.warn("localStorage write blocked", key, e); return false; }
}
function safeFileName(name){
  return String(name || "file").replace(/[^\w.\-ぁ-んァ-ヶ一-龯 ]/g, "_").slice(0, 80) || "file";
}
function escAttr(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function loopbackHost(host){
  const h = String(host || "").toLowerCase();
  return h === "localhost" || h === "127.0.0.1" || h === "::1" || h === "[::1]";
}
function hostFromMaybeUrl(raw){
  try{ return new URL(String(raw || ""), location.href).hostname.toLowerCase(); } catch(e){ return ""; }
}
function configuredConnectHost(host){
  const h = String(host || "").toLowerCase();
  try {
    const urls = [];
    if (typeof CFG !== "undefined") urls.push(CFG.base, CFG.ttsUrl, CFG.ttsRegUrl, CFG.vvUrl);
    if (typeof curProv === "function") urls.push(curProv().base);
    return urls.some(u => hostFromMaybeUrl(u) === h);
  } catch(e){ return false; }
}
function knownConnectHost(host){
  const h = String(host || "").toLowerCase();
  if (SECURITY.allowedConnectHosts.has(h)) return true;
  if (h.endsWith(".wikipedia.org")) return true;
  return configuredConnectHost(h);
}
function safeUrl(raw, policy={}){
  const text = String(raw || "").trim();
  if (!text) throw new Error("URLが空です");
  let u;
  try{ u = new URL(text, location.href); } catch(e){ throw new Error("URL形式が不正です"); }
  if (u.username || u.password) throw new Error("URLに認証情報を含めないでください");
  if (u.protocol === "http:" && !(policy.allowLocal && loopbackHost(u.hostname))) {
    throw new Error("http接続はlocalhost/127.0.0.1のみ許可します");
  }
  if (u.protocol !== "https:" && !(policy.allowLocal && u.protocol === "http:" && loopbackHost(u.hostname))) {
    throw new Error("httpsまたはlocalhostのみ許可します");
  }
  if (policy.hosts && !policy.hosts.has(u.hostname) && !(policy.allowLocal && loopbackHost(u.hostname))) {
    throw new Error("許可されていない接続先です: " + u.hostname);
  }
  if (u.protocol === "https:" && !policy.allowAnyHttps && !policy.hosts && !knownConnectHost(u.hostname)) {
    throw new Error("許可されていない接続先です: " + u.hostname);
  }
  return u.toString();
}
function safeFetch(raw, opt={}, policy={}){
  const method = String(opt.method || "GET").toUpperCase();
  if (!["GET","POST","HEAD"].includes(method)) throw new Error("許可されていないHTTPメソッドです");
  const finalOpt = Object.assign({}, opt, { credentials:"omit", referrerPolicy:"no-referrer", redirect:"error" });
  return fetch(safeUrl(raw, policy), finalOpt);
}
function guardResponseSize(res, max=SECURITY.maxResponseBytes){
  const len = Number(res.headers.get("content-length") || 0);
  if (len && len > max) throw new Error("レスポンスが大きすぎます");
  return res;
}
function secureAnchor(a, href){
  if (!a) return;
  if (!href) { a.removeAttribute("href"); a.rel = "noopener noreferrer"; a.referrerPolicy = "no-referrer"; return; }
  try { a.href = safeUrl(href, { allowLocal:false, allowAnyHttps:true }); }
  catch(e){ a.removeAttribute("href"); }
  a.rel = "noopener noreferrer";
  a.referrerPolicy = "no-referrer";
}
function sanitizeCfgInPlace(cfg){
  cfg.prov = PROVIDERS[cfg.prov] ? cfg.prov : "gemini";
  for (const k of ["base","model","apiKey","persona","feedUrl","ttsUrl","ttsVoice","ttsVoiceCalm","ttsModel","ttsKey","ttsRegUrl","vvUrl","vvSpeaker","vvSpeakerCalm","techTopic","aiModeGoal","aiModeRole","aiModeAudience","aiModeMaterial","aiModeAvoid","aiModeOutput"]) cfg[k] = clipText(cfg[k] || "", k.includes("Key") ? 4096 : 12000);
  cfg.temp = Math.max(0, Math.min(1.5, Number(cfg.temp ?? 0.4)));
  cfg.ingestMin = Math.max(0, Math.min(1440, Number(cfg.ingestMin || 0)));
  cfg.affection = Math.max(0, Math.min(100, Number(cfg.affection ?? 50)));
  cfg.voicePreset = Math.max(0, Math.min(9, Number(cfg.voicePreset || 0)));
  return cfg;
}

/* ---------- プロバイダ(脳)定義 ---------- */
const PROVIDERS = {
  gemini:     { name:"Google Gemini(無料枠・高知能・100万文脈)", kind:"gemini", base:"https://generativelanguage.googleapis.com/v1beta", model:"gemini-2.5-flash", key:"https://aistudio.google.com/apikey" },
  groq:       { name:"Groq(超高速・無料)",                       kind:"openai", base:"https://api.groq.com/openai/v1", model:"llama-3.3-70b-versatile", key:"https://console.groq.com/keys" },
  cerebras:   { name:"Cerebras(最速級・無料)",                   kind:"openai", base:"https://api.cerebras.ai/v1", model:"llama-3.3-70b", key:"https://cloud.cerebras.ai" },
  openrouter: { name:"OpenRouter(無料モデル多数)",               kind:"openai", base:"https://openrouter.ai/api/v1", model:"meta-llama/llama-3.3-70b-instruct:free", key:"https://openrouter.ai/keys" },
  zai:        { name:"Z.AI GLM-4.7-Flash(無料)",                 kind:"openai", base:"https://api.z.ai/api/paas/v4", model:"glm-4-flash", key:"https://z.ai" },
  custom:     { name:"カスタム(OpenAI互換)",                     kind:"openai", base:"", model:"", key:"" },
};

/* ---------- 設定(localStorage) ---------- */
const CFG = sanitizeCfgInPlace(Object.assign({ prov:"gemini", base:"", model:"", apiKey:"", web:false, voice:false, emoji:true, persona:"", ingestMin:0, feedUrl:"", clearOnLoad:false, affection:50, ttsMode:"web", ttsUrl:"http://localhost:8000/v1/audio/speech", ttsVoice:"", ttsVoiceCalm:"", ttsModel:"irodori-tts-500m-v3-voicedesign", ttsKey:"", ttsRegUrl:"", voicePreset:0, vvUrl:"http://127.0.0.1:10101", vvSpeaker:"888753760", vvSpeakerCalm:"", vvAuto:false, temp:0.4, techSources:false, techTopic:"AI LLM machine learning", rag:true, tools:true, aiMode:false, aiModeGoal:"", aiModeRole:"編集者・厳格な採点者・改善提案者", aiModeAudience:"", aiModeMaterial:"", aiModeAvoid:"", aiModeOutput:"1. 問題点\n2. 理由\n3. 修正案\n4. 完成版", aiModeLoop:true, aiModeSelfCheck:true },
  safeJsonLoad("mind.cfg", {})));
CFG.voice = false;   // 起動時は毎回OFF。必要なときだけユーザーが手動でONにする。
CFG.web = false;      // 起動時の外部通信はOFF。必要なときだけユーザーが手動でONにする。
CFG.ingestMin = 0;
CFG.vvAuto = false;   // ローカルTTSポート探索も起動時はしない。
CFG.techSources = false;
CFG.apiKey = "";
CFG.ttsKey = "";
function cfgForStorage(){
  const copy = Object.assign({}, sanitizeCfgInPlace(Object.assign({}, CFG)));
  if (!SECURITY.persistSecrets) { copy.apiKey = ""; copy.ttsKey = ""; }
  return copy;
}
function purgeStoredSecrets(){
  try {
    const raw = localStorage.getItem("mind.cfg"); if (!raw) return;
    const c = JSON.parse(raw);
    if (c && typeof c === "object") { c.apiKey = ""; c.ttsKey = ""; c.web = false; c.vvAuto = false; c.ingestMin = 0; c.techSources = false; safeStore("mind.cfg", JSON.stringify(c)); }
  } catch(e){}
}
purgeStoredSecrets();
function saveCfg(){ sanitizeCfgInPlace(CFG); safeStore("mind.cfg", JSON.stringify(cfgForStorage())); }
function curProv(){ const p = PROVIDERS[CFG.prov] || PROVIDERS.custom; return { kind:p.kind, base: CFG.base||p.base, model: CFG.model||p.model }; }

/* ---------- 記憶 ---------- */
let history = Array.isArray(safeJsonLoad("mind.hist", [])) ? safeJsonLoad("mind.hist", []).slice(-60) : [];   // [{role, content}]
let longMem = safeGetString("mind.longmem", 80000);              // 覚えておくこと(自由記述)
function saveHist(){ safeStore("mind.hist", JSON.stringify(history.slice(-60))); }
function saveMem(){ safeStore("mind.longmem", clipText(longMem, 80000)); }
let worldMem = Array.isArray(safeJsonLoad("mind.world", [])) ? safeJsonLoad("mind.world", []).slice(-40) : [];  // 自律取り込み {t,text}
let learned = safeGetString("mind.learned", 2000);              // 自己学習(振る舞い方針)
let turnsSinceLearn = 0;

// コードフェンス除去＋最初の波括弧オブジェクトを括弧対応で抽出＋途中で切れた場合は閉じて修復
function extractJSON(t){
  if (!t) return t;
  let s = String(t).trim().replace(/^﻿/, "");
  s = s.replace(/^```(?:json|JSON)?\s*/i, "").replace(/```\s*$/i, "").trim();   // ```json ... ``` を剥がす
  const start = s.indexOf("{");
  if (start < 0) return s;
  let depth = 0, inStr = false, esc = false;
  for (let i = start; i < s.length; i++) {
    const c = s[i];
    if (inStr) { if (esc) esc = false; else if (c === "\\") esc = true; else if (c === '"') inStr = false; }
    else if (c === '"') inStr = true;
    else if (c === "{") depth++;
    else if (c === "}") { depth--; if (depth === 0) return s.slice(start, i + 1); }
  }
  // 途中で切れている: 開いた文字列/括弧を閉じて最低限パースできる形に修復
  let rep = s.slice(start);
  if (inStr) rep += '"';
  rep = rep.replace(/,\s*$/, "");
  while (depth-- > 0) rep += "}";
  return rep;
}

/* 最新情報の自律学習: 専門分野をWeb検索→要点を抽出→エージェントの知識に日付付きで取り込む */
async function summarizeForAgent(specialty, raw){
  tempOverride = 0.2; maxTokOverride = 1024;
  try {
    const sys = `あなたは技術キュレーターです。検索/技術ソース(GitHub・HuggingFace・arXiv等)の結果から「${specialty}」に関する、確実で新しく実用的な要点だけを5〜10個の短い箇条書き(各50字以内)で日本語抽出します。安全で信頼できる技術のみ採用し、マルウェア・攻撃・悪用目的の技術は除外する。事実のみ・創作禁止・結果に無いことは書かない。ツール名/モデル名/論文の要点は具体的に。箇条書きだけを出力。`;
    return await streamLLM(sys, [{ role:"user", content:`[ソース]\n${(raw||"").slice(0,3000)}\n\n上記から要点を箇条書きで:` }], ()=>{});
  } finally { tempOverride = null; maxTokOverride = null; }
}
async function learnAgentLatest(agent){
  if (!CFG.web) throw new Error("最新情報の取り込みには🌐取り込みをONにしてください");
  if (!CFG.apiKey) throw new Error("脳(APIキー)が必要です(⚙設定)");
  const web = await webSearch(`${agent.specialty} 最新 ベストプラクティス`);
  const webOk = web && web.length > 30 && !/見つかりません|見つからなかった|情報が見つか/.test(web);
  const tech = (CFG.techSources !== false) ? await gatherTech(agent.specialty) : "";   // GitHub/HF/arXivから安全な技術のみ
  const raw = [ webOk ? web : "", tech ].filter(Boolean).join("\n\n");
  let notes = "";
  if (raw.length > 30) notes = (await summarizeForAgent(agent.specialty, raw) || "").trim();
  agent.knowledge = (agent.knowledge || "").replace(/\n*##\s*最新情報[\s\S]*$/,"").trim();   // 既存の最新情報を差し替え
  const src = tech ? "Web/GitHub/HF/arXiv" : "Web";
  if (notes) agent.knowledge += `\n\n## 最新情報(${new Date().toLocaleDateString("ja-JP")} 時点・${src})\n${notes}`;
  agent.freshAt = Date.now();
  saveAgents();
  return { updated: !!notes, usedTech: !!tech };
}
async function distillAgent(desc){
  if (!CFG.apiKey) throw new Error("蒸留には脳(APIキー)が必要です(⚙設定)");
  tempOverride = 0.3; maxTokOverride = 4096;   // 設計は安定・知識+模範例が切れない長さを確保
  const userMsg = [{ role:"user", content:`専門分野: ${desc}\nこの分野の専門家エージェントを蒸留してください。JSONオブジェクトのみで出力(コードフェンス禁止)。` }];
  try {
    let spec = null, lastErr = null;
    // ①構造化出力(JSONモード)→ ②非対応プロバイダ等で失敗したら通常出力+堅牢パースで再試行
    for (const useJson of [true, false]) {
      try {
        const full = await streamLLM(DISTILLER_SYS, userMsg, ()=>{}, { jsonMode: useJson });
        spec = JSON.parse(extractJSON(full));
        if (spec && typeof spec === "object") break;
      } catch (e) { lastErr = e; spec = null; }
    }
    if (!spec) throw new Error((lastErr && lastErr.message) ? lastErr.message : "JSONの解析に失敗しました");
    const agent = {
      id: "ag_" + Date.now().toString(36), created: Date.now(), source: desc,
      name: (spec.name || desc).toString().slice(0, 16),
      specialty: (spec.specialty || desc).toString(),
      system: (spec.system || "").toString(),
      rules: Array.isArray(spec.rules) ? spec.rules.map(String).slice(0, 10) : [],
      knowledge: (spec.knowledge || "").toString(),
      examples: Array.isArray(spec.examples) ? spec.examples.filter(e=>e&&e.q&&e.a).slice(0, 4) : [],
      format: (spec.format || "").toString(),
      precise: spec.precise !== false,
      temp: spec.precise !== false ? 0.2 : 0.45,
      freshAt: 0,
    };
    agents.push(agent); saveAgents();
    // 自律学習: 蒸留直後にWebで最新情報を取り込む(教師の知識は学習時点で止まっているため)
    if (CFG.web) { try { await learnAgentLatest(agent); } catch(e){ /* 学習失敗でも蒸留自体は成功 */ } }
    return agent;
  } finally { tempOverride = null; maxTokOverride = null; }
}

/* ---------- 引き継ぎ: 専門家(技術)の書き出し/読み込み/継承。既存を壊さず必ず新IDで安全に取り込む ---------- */
function sanitizeAgent(o){
  if (!o || typeof o !== "object") return null;
  const sys = (o.system || "").toString();
  const exOk = Array.isArray(o.examples) && o.examples.length;
  if (!sys && !(o.knowledge) && !exOk) return null;   // 中身が空のものは無効として弾く
  return {
    id: "ag_" + Date.now().toString(36) + Math.floor(Math.random()*1e6).toString(36),   // 衝突回避のため常に新ID
    created: Number(o.created) || Date.now(), source: (o.source || o.specialty || "").toString().slice(0,200),
    name: (o.name || o.specialty || "無名").toString().slice(0,16),
    specialty: (o.specialty || o.name || "").toString().slice(0,200),
    system: sys.slice(0,4000),
    rules: Array.isArray(o.rules) ? o.rules.map(String).map(s=>s.slice(0,200)).slice(0,12) : [],
    knowledge: (o.knowledge || "").toString().slice(0,4000),
    examples: Array.isArray(o.examples) ? o.examples.filter(e=>e&&e.q&&e.a).map(e=>({ q:String(e.q).slice(0,300), a:String(e.a).slice(0,800) })).slice(0,6) : [],
    format: (o.format || "").toString().slice(0,600),
    precise: o.precise !== false,
    temp: (typeof o.temp === "number" && o.temp >= 0 && o.temp <= 1.5) ? o.temp : (o.precise !== false ? 0.2 : 0.45),
    freshAt: Number(o.freshAt) || 0,
  };
}

function downloadText(filename, text){
  try { const blob = new Blob([text], { type:"application/json" }); const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = filename; document.body.appendChild(a); a.click();
    setTimeout(()=>{ try{ document.body.removeChild(a); URL.revokeObjectURL(url); }catch(_){ } }, 100);
  } catch(e){}
}
function importAgentsFromText(text){
  let data; try { data = JSON.parse(text); } catch(e){ throw new Error("JSONとして読めませんでした"); }
  const raw = Array.isArray(data) ? data : (data && Array.isArray(data.agents) ? data.agents : (data && data.system ? [data] : null));
  if (!raw) throw new Error("エージェントのデータ形式ではありません");
  let added = 0, skipped = 0;
  for (const o of raw){ const s = sanitizeAgent(o); if (!s){ skipped++; continue; } agents.push(s); added++; }   // 既存は消さず追加のみ
  if (added) saveAgents();
  return { added, skipped };
}
function cloneAgent(id){
  const src = agents.find(a=>a.id===id); if (!src) return null;
  const copy = sanitizeAgent(Object.assign({}, src, { name:(src.name+"継承").slice(0,16) }));   // 新IDの独立コピー(技術を継承)
  if (copy){ agents.push(copy); saveAgents(); }
  return copy;
}

const EMOJI_PAIRS = Object.keys(EMOJI_DICT).sort((a,b)=>b.length-a.length);
const EMOJI_RE = new RegExp(EMOJI_PAIRS.map(w=>w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|"), "g");
function emojify(text){
  if(!CFG.emoji || !text) return text;
  return text.replace(EMOJI_RE, (m, off, str)=>{ const e=EMOJI_DICT[m]; if(!e) return m; return str.slice(off+m.length, off+m.length+e.length)===e ? m : m+e; });
}

let abortCtl = null;
function buildMessages(){
  // 直近の履歴をそのまま(長すぎる場合は末尾を残す)
  return history.slice(-24).map(m => ({ role: m.role, content: m.content }));

let tempOverride = null, maxTokOverride = null;   // 蒸留エージェント実行/蒸留時の一時上書き
function curTemp(){ if (tempOverride != null) return tempOverride; const a = activeAgent(); if (a && a.temp != null) return a.temp; return CFG.temp != null ? CFG.temp : 0.4; }
function curMaxTok(){ return maxTokOverride || 1024; }
async function streamLLM(sysText, msgs, onToken, opts){
  opts = opts || {};
  const pv = curProv();
  if (!CFG.apiKey) throw new Error("APIキーが未設定です(⚙設定)");
  abortCtl = new AbortController();
  const apiBase = safeUrl(pv.base, { allowLocal:true }).replace(/\/$/,"");
  let url, opt;
  if (pv.kind === "gemini") {
    url = `${apiBase}/models/${encodeURIComponent(pv.model)}:streamGenerateContent?alt=sse&key=${encodeURIComponent(CFG.apiKey)}`;
    const contents = msgs.map(m => ({ role: m.role === "assistant" ? "model" : "user", parts: [{ text: m.content }] }));
    if (opts.image && opts.image.data) { for (let i=contents.length-1;i>=0;i--){ if(contents[i].role==="user"){ contents[i].parts.push({ inline_data:{ mime_type: opts.image.mime||"image/jpeg", data: opts.image.data } }); break; } } }   // ③ マルチモーダル(画像)
    const genCfg = { temperature: curTemp(), topP: 0.9, maxOutputTokens: curMaxTok() };   // temperatureは設定で0〜1.5
    if (opts.jsonMode) genCfg.responseMimeType = "application/json";   // 構造化出力(コードフェンス無しの正しいJSONを強制)
    opt = { method:"POST", headers:{ "Content-Type":"application/json" }, signal: abortCtl.signal,
      body: JSON.stringify({ system_instruction: { parts: [{ text: sysText }] }, contents, generationConfig: genCfg }) };
  } else { // OpenAI互換
    url = `${apiBase}/chat/completions`;
    const payload = { model: pv.model, stream: true, temperature: curTemp(), top_p: 0.9, max_tokens: curMaxTok(),
      messages: [{ role:"system", content: sysText }, ...msgs] };
    if (opts.jsonMode) payload.response_format = { type: "json_object" };   // 構造化出力(OpenAI互換のJSONモード)
    opt = { method:"POST", headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+CFG.apiKey }, signal: abortCtl.signal,
      body: JSON.stringify(payload) };
  }
  const res = guardResponseSize(await safeFetch(url, opt, { allowLocal:true }));
  if (!res.ok) { const t = await res.text().catch(()=> ""); throw new Error(`HTTP ${res.status}: ${t.slice(0,200)}`); }
  const reader = res.body.getReader(); const dec = new TextDecoder();
  let buf = "", full = "";
  while (true) {
    const { done, value } = await reader.read(); if (done) break;
    buf += dec.decode(value, { stream:true });
    let i;
    while ((i = buf.indexOf("\n")) >= 0) {
      let line = buf.slice(0, i).trim(); buf = buf.slice(i + 1);
      if (!line.startsWith("data:")) continue;
      const data = line.slice(5).trim();
      if (data === "[DONE]") continue;
      try {
        const j = JSON.parse(data);
        let piece = "";
        if (pv.kind === "gemini") piece = j.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("") || "";
        else piece = j.choices?.[0]?.delta?.content || "";
        if (piece) { full += piece; onToken(full); }
      } catch (e) { /* 部分JSONはスキップ */ }
    }
  }
  return full;
}

/* ---------- 自律: 定期的に最新ニュース/技術を取り込み記憶へ蓄積 ---------- */
let ingesting = false;
async function gatherHeadlines(){
  if (!CFG.web) return [];
  const out=[];
  try {
    const ids = await _json(await _politeFetch("https://hacker-news.firebaseio.com/v0/topstories.json"));
    const items = await Promise.all((Array.isArray(ids)?ids:[]).slice(0,8).map(id=>_politeFetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r=>r?r.json():null).catch(()=>null)));
    items.filter(Boolean).forEach(i=>{ if(i.title) out.push("[tech] "+i.title); });
  } catch(e){}
  try {
    const d=new Date(Date.now()-864e5), y=d.getUTCFullYear(), m=String(d.getUTCMonth()+1).padStart(2,"0"), dd=String(d.getUTCDate()).padStart(2,"0");
    const fe = await _json(await _politeFetch(`https://api.wikimedia.org/feed/v1/wikipedia/ja/featured/${y}/${m}/${dd}`));
    (fe?.news||[]).slice(0,5).forEach(n=>{ const t=(n.story||"").replace(/<[^>]+>/g,"").trim(); if(t) out.push("[news] "+t); });
  } catch(e){}
  // GitHub / HuggingFace / arXiv から安全性の高い技術を自動取り込み
  if (CFG.techSources !== false) { try { const tech = await gatherTech(CFG.techTopic || "AI LLM machine learning"); tech.split("\n").filter(Boolean).slice(0,6).forEach(l=>out.push("[tech] "+l)); } catch(e){} }
  return out;
}
async function ingest(manual){
  if (!CFG.web) { if (manual) sys("🌐 取り込みはOFFです。必要な場合だけONにしてください。"); return; }
  if (ingesting) return; ingesting=true;
  const note = sys("📰 最新情報を取り込み中…");
  try {
    const heads = await gatherHeadlines();
    if (!heads.length){ note.firstChild ? note.firstChild.textContent="📰 取り込めるニュースがありませんでした" : note.textContent="📰 取り込めるニュースがありませんでした"; ingesting=false; return; }
    let digest;
    if (CFG.apiKey) {
      const prompt = `次は最新のニュース/技術の見出しです。長期記憶に残す価値のある要点だけを、日本語の箇条書き3〜6個に蒸留してください。固有名詞・数値・日付は保持。広告的な見出しは除く。\n\n${heads.join("\n")}`;
      digest = (await streamLLM("あなたは情報を簡潔に蒸留する編集者です。", [{role:"user",content:prompt}], ()=>{})).trim();
    } else {
      digest = heads.slice(0,8).join("\n");
    }
    worldMem.push({ t: Date.now(), text: digest }); saveWorld();
    note.remove();
    add("📰 取り込んだ要点:\n" + digest, "tool");
  } catch(e){ note.remove(); add("📰 取り込み失敗: "+e.message, "tool"); }
  ingesting=false;
}
async function fetchCloudFeed(){
  if (!CFG.web) return;
  if (!CFG.feedUrl) return;
  try {
    const r = guardResponseSize(await safeFetch(CFG.feedUrl, { cache:"no-store" }, { allowLocal:true }), 512 * 1024);
    const data = await r.json();
    const items = Array.isArray(data) ? data : (data.items || []);
    const seen = new Set(worldMem.map(w=>w.text));
    let added = 0;
    for (const it of items.slice(0, SECURITY.maxFeedItems)) { const text = clipText(it.text || it.digest || "", SECURITY.maxFeedTextChars); if (text && !seen.has(text)) { worldMem.push({ t: Number(it.t) || Date.now(), text }); seen.add(text); added++; } }
    if (added) { worldMem.sort((a,b)=>a.t-b.t); saveWorld(); sys(`☁ クラウドから ${added} 件の最新情報を受信(タブを閉じていた間の裏取り込み)`); }
  } catch(e){ /* オフライン等は無視 */ }
}
function scheduleIngest(){
  if (window.__ingTimer) clearInterval(window.__ingTimer);
  if (CFG.web && CFG.ingestMin>0) window.__ingTimer = setInterval(()=>{ ingest(false); fetchCloudFeed(); reflect(false); }, CFG.ingestMin*60000);
}

/* ---------- 自己学習: 会話から長期記憶を抽出 / フィードバック方針 ---------- */
async function learnFromConversation(){
  if (!CFG.apiKey || history.length<4) return;
  try {
    const convo = history.slice(-12).map(m=>(m.role==="user"?"ユーザー: ":"AI: ")+m.content).join("\n");
    const prompt = `次の会話から、ユーザーについて『長期的に覚える価値のある事実・好み・前提』だけを箇条書きで抽出してください。一時的な話題や既出は除く。無ければ「なし」とだけ書いてください。\n\n${convo}`;
    const facts = (await streamLLM("あなたはユーザーの長期記憶を整理するアシスタントです。", [{role:"user",content:prompt}], ()=>{})).trim();
    if (facts && !/^なし/.test(facts)) { longMem = (longMem? longMem+"\n":"") + facts; longMem=longMem.slice(-2000); saveMem(); sys("🧠 会話から学習し、長期記憶を更新しました。"); reflect(false); }
  } catch(e){}
}
async function reflect(manual){
  if (!CFG.apiKey) { if (manual) sys("内省には脳(APIキー)が必要です。"); return; }
  const needLong = longMem.length > 1400, needLearn = learned.length > 1400;
  if (!manual && !needLong && !needLearn) return;
  const note = sys("🪞 記憶を内省・整理中…");
  try {
    if (manual || needLong) {
      const r = (await streamLLM("あなたは記憶を整理する司書です。重複を統合し、重要で長期的な事実だけを残し、簡潔な箇条書きに再構成します。",
        [{role:"user",content:`次の長期記憶を、重複・冗長を取り除き、本当に長期保存すべき事実だけの簡潔な箇条書き(最大15項目)に整理してください。前置きや解説は不要、箇条書きのみ。\n\n${longMem}`}], ()=>{})).trim();
      if (r) { longMem = r.slice(0,2000); saveMem(); }
    }
    if (manual || needLearn) {
      const r = (await streamLLM("あなたは行動方針を整理するコーチです。重複・矛盾を解消し、有効な指針だけを簡潔に残します。",
        [{role:"user",content:`次の「学習した振る舞いの方針」を、重複・矛盾を解消し、有効な指針だけの簡潔な箇条書き(最大10項目)に整理してください。箇条書きのみ。\n\n${learned}`}], ()=>{})).trim();
      if (r) { learned = r.slice(0,2000); saveLearned(); }
    }
    note.remove(); sys("🪞 内省完了。記憶と方針を整理しました。");
  } catch(e){ note.remove(); sys("🪞 内省失敗: "+e.message); }
}

const _sleep = (ms)=> new Promise(r=>setTimeout(r,ms));
async function _politeFetch(url, ms=6000){
  const gap = 350 - (Date.now() - _lastFetchT); if (gap > 0) await _sleep(gap);   // 最低350ms間隔=叩きすぎない
  _lastFetchT = Date.now();
  const c=new AbortController(); const to=setTimeout(()=>{ try{c.abort();}catch(_){}}, ms);
  try { const r = guardResponseSize(await safeFetch(url, { signal:c.signal }, { allowLocal:false }), 2 * 1024 * 1024); clearTimeout(to); return r.ok ? r : null; }
  catch(e){ clearTimeout(to); return null; }
}
const _json = async (r)=> r ? r.json().catch(()=>null) : null;
async function _wiki(lang, q){
  const j = await _json(await _politeFetch(`https://${lang}.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&srlimit=1&format=json&origin=*`));
  const hit = j?.query?.search?.[0]; if(!hit) return null;
  const sj = await _json(await _politeFetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(hit.title.replace(/ /g,"_"))}`));
  return sj?.extract ? `【Wikipedia(${lang}) ${hit.title}】${sj.extract}` : null;
}
async function _wikidata(q){
  const lang = /[぀-ヿ一-鿿]/.test(q) ? "ja" : "en";
  const j = await _json(await _politeFetch(`https://www.wikidata.org/w/api.php?action=wbsearchentities&search=${encodeURIComponent(q)}&language=${lang}&uselang=${lang}&limit=2&format=json&origin=*`));
  const out = (j?.search||[]).filter(e=>e.description).slice(0,2).map(e=>`【Wikidata ${e.label}】${e.description}`);
  return out.length ? out.join("\n") : null;
}
async function _ddg(q){
  const j = await _json(await _politeFetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&skip_disambig=1`));
  const txt = j ? (j.AbstractText || j.Definition || (j.RelatedTopics?.[0]?.Text) || "") : "";
  return txt ? `【DuckDuckGo】${txt}` : null;
}
async function webSearch(q){
  q = q.trim().replace(/^[「『\"]|[」』\"]$/g, "");
  if(!q) return "検索語が空です。";
  const cached = _searchCache.get(q); if (cached && Date.now()-cached.t < 600000) return cached.text;   // bot判定回避: 同じ検索は再利用
  const ja = /[぀-ヿ一-鿿]/.test(q);
  const order = ja ? ["wj","we","wd","dd"] : ["we","wj","wd","dd"];   // 言語で優先順を切替
  const out = [];
  for (const src of order){
    let r=null;
    try {
      if (src==="wj") r = await _wiki("ja", q);
      else if (src==="we") r = await _wiki("en", q);
      else if (src==="wd") r = await _wikidata(q);
      else if (src==="dd") r = await _ddg(q);
    } catch(e){ r=null; }
    if (r) out.push(r);
    if (out.length >= 2) break;     // 十分集まったら打ち止め=サーバを叩きすぎない
  }
  const text = out.length ? out.join("\n\n") : `「${q}」に該当する確かな情報は見つかりませんでした。`;
  _searchCache.set(q, { t:Date.now(), text });
  return text;
}

/* ---------- 技術ソース: GitHub / HuggingFace / arXiv から「安全性の高い技術のみ」自動取り込み ----------
   各ソースは失敗(CORS/オフライン等)しても [] を返し、本体は壊れない。攻撃・悪用系は除外。信頼指標(★/DL数/モデレーション)で品質を担保。*/
const _UNSAFE_RE = /\b(malware|ransomware|botnet|keylogger|rootkit|spyware|stealer|trojan|backdoor|ddos|phishing|carding|credential[- ]?stealer|exploit[- ]?kit|aimbot|wallhack|cheat\s?engine)\b|マルウェア|ランサム|遠隔操作ウイルス|ウイルス作成|不正アクセス|総当たり攻撃|チート|脆弱性の悪用/i;
function isSafeTech(text){ return !!text && !_UNSAFE_RE.test(text); }   // 悪用・攻撃用途は弾く=安全性の高い技術のみ
async function ghSearch(q){
  const j = await _json(await _politeFetch(`https://api.github.com/search/repositories?q=${encodeURIComponent(q)}&sort=stars&order=desc&per_page=6`));
  return (j?.items || [])
    .filter(r => (r.stargazers_count||0) >= 200 && !r.archived && r.license && isSafeTech(`${r.full_name} ${r.description||""} ${(r.topics||[]).join(" ")}`))   // 高star・非archive・ライセンス有=信頼
    .slice(0,3)
    .map(r => `【GitHub ★${r.stargazers_count} ${r.license?.spdx_id||""}】${r.full_name}: ${(r.description||"").replace(/\s+/g," ").slice(0,140)}`);
}
async function hfSearch(q){
  const j = await _json(await _politeFetch(`https://huggingface.co/api/models?search=${encodeURIComponent(q)}&sort=downloads&direction=-1&limit=8`));
  return (Array.isArray(j) ? j : [])
    .filter(m => (m.downloads||0) >= 1000 && !m.private && !m.gated && isSafeTech(`${m.id||m.modelId||""} ${m.pipeline_tag||""} ${(m.tags||[]).join(" ")}`))   // DL多・非private・非gated=信頼
    .slice(0,3)
    .map(m => `【HuggingFace ⬇${m.downloads||0}】${m.id||m.modelId}${m.pipeline_tag?` (${m.pipeline_tag})`:""}`);
}
async function arxivSearch(q){
  const r = await _politeFetch(`https://export.arxiv.org/api/query?search_query=${encodeURIComponent("all:"+q)}&start=0&max_results=4&sortBy=submittedDate&sortOrder=descending`);
  if (!r) return [];
  const xml = await r.text().catch(()=>null); if (!xml) return [];
  const out = [];
  for (const e of xml.split("<entry>").slice(1,5)){
    const g = (re)=>{ const m = e.match(re); return m ? m[1].replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim() : ""; };
    const title = g(/<title>([\s\S]*?)<\/title>/), summ = g(/<summary>([\s\S]*?)<\/summary>/);
    const line = `【arXiv】${title.slice(0,120)}: ${summ.slice(0,170)}`;
    if (title && isSafeTech(line)) out.push(line);
  }
  return out;
}
async function gatherTech(q){
  if (!q) return "";
  const lines = [];
  for (const fn of [ghSearch, hfSearch, arxivSearch]){ try { (await fn(q)).forEach(l=>lines.push(l)); } catch(e){ /* 1ソース失敗は無視=壊れない */ } }
  return lines.filter(isSafeTech).join("\n");
}

/* ================= ① RAG記憶: 埋め込みで関連だけ動的注入(賢さ+正確さ+速さ+コスト同時改善) ================= */
let docs = Array.isArray(safeJsonLoad("mind.docs", [])) ? safeJsonLoad("mind.docs", []).slice(-400) : [];   // 取り込んだ文書チャンク [{id,text,src}]
function saveDocs(){ safeStore("mind.docs", JSON.stringify(docs.slice(-400))); }
const _vecCache = new Map();   // hash(method+text) -> vector(Array)
function _hash(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return (h>>>0).toString(36); }
function localEmbed(t){   // 依存なし・即時の局所埋め込み(文字3-gramハッシュ→正規化256次元)
  const dim=256, v=new Array(dim).fill(0); const s=(t||"").toLowerCase();
  for(let i=0;i<s.length-2;i++){ const h=(((s.charCodeAt(i)*131071+s.charCodeAt(i+1)*8191+s.charCodeAt(i+2))%dim)+dim)%dim; v[h]+=1; }
  let n=0; for(let i=0;i<dim;i++) n+=v[i]*v[i]; n=Math.sqrt(n)||1; for(let i=0;i<dim;i++) v[i]/=n; return v;
}
function embedMethod(){ return (curProv().kind==="gemini" && CFG.apiKey) ? "gemini" : "local"; }
async function embedTexts(texts){
  const method = embedMethod();
  const out = new Array(texts.length); const need=[], needIdx=[];
  texts.forEach((t,i)=>{ const k=method+":"+_hash(t); if(_vecCache.has(k)) out[i]=_vecCache.get(k); else { need.push(t); needIdx.push(i); } });
  if (need.length){
    let vecs=null;
    if (method==="gemini"){
      try{
        const pv=curProv();
        const base=safeUrl(pv.base, { allowLocal:true }).replace(/\/$/,"");
        const r=guardResponseSize(await safeFetch(`${base}/models/text-embedding-004:batchEmbedContents?key=${encodeURIComponent(CFG.apiKey)}`,
          { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ requests: need.map(t=>({ model:"models/text-embedding-004", content:{ parts:[{text:t.slice(0,2000)}] } })) }) },
          { allowLocal:true }));
        if(r.ok){ const j=await r.json(); vecs=(j.embeddings||[]).map(e=>e.values); }
      }catch(e){}
    }
    if(!vecs || vecs.length!==need.length) vecs = need.map(localEmbed);   // 失敗/非対応は局所埋め込みへフォールバック
    vecs.forEach((v,j)=>{ const i=needIdx[j], k=method+":"+_hash(need[j]); _vecCache.set(k,v); out[i]=v; });
  }
  return out;
}
function cosine(a,b){ let d=0; const n=Math.min(a.length,b.length); for(let i=0;i<n;i++) d+=a[i]*b[i]; return d; }
function _chunk(text, src){ const parts=[]; (text||"").split(/\n{2,}|(?<=。)\s*/).forEach(p=>{ p=p.trim(); if(p.length>=8) parts.push({ text:p.slice(0,500), src }); }); return parts; }
function ragItems(){   // 検索対象: 長期記憶 + 自律取り込み + 取り込み文書 + 稼働エージェントの知識
  const items=[];
  _chunk(longMem,"記憶").forEach(c=>items.push(c));
  worldMem.slice(-30).forEach(w=>items.push({ text:(w.text||"").slice(0,500), src:"取込" }));
  docs.forEach(d=>items.push({ text:d.text, src:d.src||"文書" }));
  const ag=activeAgent(); if(ag&&ag.knowledge) _chunk(ag.knowledge, ag.name).forEach(c=>items.push(c));
  return items.filter(i=>i.text && i.text.length>=8);
}
async function retrieveContext(query, k){
  if (!CFG.rag) return "";
  const items = ragItems(); if (!items.length) return "";
  try {
    const [qv, ...ivs] = await embedTexts([query, ...items.map(i=>i.text)]);
    const scored = items.map((it,i)=>({ it, s: cosine(qv, ivs[i]) })).sort((a,b)=>b.s-a.s).slice(0, k||6);
    const picked = scored.filter(x=>x.s>0.05);
    if (!picked.length) return "";
    return picked.map(x=>`(${x.it.src}) ${x.it.text}`).join("\n");
  } catch(e){ return ""; }
}

/* ================= ② ツール使用: ((TOOL: 名前 | 入力)) を確実に実行 ================= */
function safeCalcExpr(input){
  const s = String(input || "").replace(/\s+/g, "");
  if (!s || s.length > 160 || /[^0-9+\-*/%().eE]/.test(s)) throw new Error("invalid");
  let i = 0;
  const peek = ()=>s[i];
  const eat = c=>{ if(s[i]===c){ i++; return true; } return false; };
  const number = ()=>{
    const m = s.slice(i).match(/^(?:\d+(?:\.\d*)?|\.\d+)(?:e[+\-]?\d+)?/i);
    if(!m) throw new Error("number");
    i += m[0].length;
    return Number(m[0]);
  };
  const factor = ()=>{
    if (eat("+")) return factor();
    if (eat("-")) return -factor();
    if (eat("(")) { const v = expr(); if(!eat(")")) throw new Error("paren"); return v; }
    return number();
  };
  const term = ()=>{
    let v = factor();
    while (peek()==="*" || peek()==="/" || peek()==="%") {
      const op = s[i++], r = factor();
      if (op==="*") v *= r; else if (op==="/") v /= r; else v %= r;
      if (!Number.isFinite(v)) throw new Error("finite");
    }
    return v;
  };
  const expr = ()=>{
    let v = term();
    while (peek()==="+" || peek()==="-") {
      const op = s[i++], r = term();
      v = op==="+" ? v + r : v - r;
      if (!Number.isFinite(v)) throw new Error("finite");
    }
    return v;
  };
  const v = expr();
  if (i !== s.length || !Number.isFinite(v)) throw new Error("invalid");
  return v;
}
const TOOLS = {
  calc: { desc:"四則・数式計算。入力は式(例: (12*3+4)/2)", run:(x)=>{ try{ return String(safeCalcExpr(x)); }catch(e){ return "計算エラー"; } } },
  time: { desc:"現在の日時を返す。入力不要", run:()=> new Date().toLocaleString("ja-JP") },
  search:{ desc:"Web検索(事実確認)。入力は検索語", run:(x)=> webSearch(x) },
  tech: { desc:"GitHub/HuggingFace/arXivから安全な技術を検索。入力はトピック", run:(x)=> gatherTech(x) },
};
function toolsHelp(){ return "# 使えるツール(必要な時だけ、行頭に1つ書く)\n" + Object.entries(TOOLS).map(([k,v])=>`- ((TOOL: ${k} | 入力)) … ${v.desc}`).join("\n") + "\n結果が [ツール結果] として渡されたら、それだけを根拠に最終回答する。"; }
async function runTool(name, input){
  const t = TOOLS[(name||"").trim().toLowerCase()]; if(!t) return `不明なツール: ${name}`;
  try { const r = await t.run((input||"").trim()); return (r==null?"":String(r)).slice(0,1200) || "(結果なし)"; }
  catch(e){ return "ツール実行エラー: "+e.message; }
}

/* ================= ④ エージェントの自己評価・自己改善ループ ================= */
async function evalAgent(agent){
  if(!CFG.apiKey) throw new Error("評価には脳(APIキー)が必要です");
  tempOverride=0.3; maxTokOverride=2048;
  let questions=[];
  try {
    const q = await streamLLM(`あなたは試験官です。専門「${agent.specialty}」の実力を測る、答えが明確で良問な評価質問を3つ作ります。JSON配列のみ出力(例: ["q1","q2","q3"])。`,
      [{role:"user",content:`専門: ${agent.specialty}\n評価用の質問を3つ、JSON配列で。`}], ()=>{}, {jsonMode:true});
    const arr = JSON.parse(extractJSON(q)); questions = Array.isArray(arr)? arr.slice(0,3).map(String) : [];
  } finally { tempOverride=null; maxTokOverride=null; }
  if(!questions.length) throw new Error("評価質問の生成に失敗しました");
  const sys = agentSystemFor(agent);
  const answers=[];
  tempOverride = agent.temp!=null?agent.temp:0.2;
  try { for(const qq of questions){ answers.push((await streamLLM(sys,[{role:"user",content:qq}],()=>{})).trim()); } }
  finally { tempOverride=null; }
  tempOverride=0.2; maxTokOverride=2048;
  try {
    const grade = await streamLLM(`あなたは厳格な採点者です。専門「${agent.specialty}」の回答群を採点します。0-100のscoreと、弱点(weaknesses:文字列配列)をJSONで返す。{"score":number,"weaknesses":[...]} のみ。`,
      [{role:"user",content: questions.map((q,i)=>`Q${i+1}: ${q}\nA${i+1}: ${answers[i]}`).join("\n\n")+"\n\n採点して。"}], ()=>{}, {jsonMode:true});
    const g = JSON.parse(extractJSON(grade));
    return { score: Math.max(0,Math.min(100, Number(g.score)||0)), weaknesses: Array.isArray(g.weaknesses)? g.weaknesses.map(String).slice(0,6):[], questions, answers };
  } finally { tempOverride=null; maxTokOverride=null; }
}
async function refineAgent(agent, weaknesses){
  if(!CFG.apiKey) throw new Error("改善には脳(APIキー)が必要です");
  tempOverride=0.3; maxTokOverride=4096;
  try {
    const cur = JSON.stringify({ system:agent.system, rules:agent.rules, knowledge:agent.knowledge, examples:agent.examples });
    const out = await streamLLM(`あなたはエージェント改善器です。現在の専門家設定と弱点を踏まえ、改善版をJSONで返す。スキーマ{"system":"","rules":[],"knowledge":"","examples":[{"q":"","a":""}]}。確実な情報だけ・創作禁止・JSONのみ。`,
      [{role:"user",content:`現在の設定:\n${cur}\n\n指摘された弱点:\n${(weaknesses||[]).map(w=>"- "+w).join("\n")}\n\nこれらを補強した改善版を出力。`}], ()=>{}, {jsonMode:true});
    const r = JSON.parse(extractJSON(out));
    if(r.system) agent.system=String(r.system).slice(0,4000);
    if(Array.isArray(r.rules)&&r.rules.length) agent.rules=r.rules.map(String).slice(0,12);
    if(r.knowledge){ const latest=(agent.knowledge.match(/\n*##\s*最新情報[\s\S]*$/)||[""])[0]; agent.knowledge=String(r.knowledge).slice(0,4000)+latest; }
    if(Array.isArray(r.examples)&&r.examples.length) agent.examples=r.examples.filter(e=>e&&e.q&&e.a).map(e=>({q:String(e.q).slice(0,300),a:String(e.a).slice(0,800)})).slice(0,6);
    saveAgents(); return agent;
  } finally { tempOverride=null; maxTokOverride=null; }
}

/* ================= ⑤ 文章AI判定・デザイン提案: stop-slop / taste-skill を学習 ================= */
// 出典: GitHub hardikpandya/stop-slop(AI文体の検出) / Leonxlnx/taste-skill(デザイン審美)
const SLOP_RULES =
`# 反slopルール(出典: hardikpandya/stop-slop)
- 前置き(「実は」「結論から言うと」「ここで重要なのは」/ "here's the thing/what/why" 等)を削り、要点を直接述べる。
- 副詞・強調語(really/just/literally/genuinely/actually/非常に/とても/しっかり/まさに/本当に 等)を削る。
- 受動態を避け、必ず人間の主語が動作する能動態に。無生物に人間の動詞を負わせない(「決定が生まれる」→誰が決めたかを書く)。
- 二項対比の定型(「Xではなく、Yだ」/ "not X, it's Y")や否定列挙(rhetorical striptease)を使わず、Yを直接述べる。
- 具体的に。曖昧な断定(「影響は大きい」「理由は構造的だ」)を避け、その具体を名指す。every/always/never の乱用も避ける。
- 読者を場面に入れる(「人々は」より「あなたは」)。抽象より具体。
- リズムを変える。文の長さを混ぜる。三つ並びより二つ。段落の終わりを毎回決め台詞にしない。
- em-dash(—)を使わない。引用句っぽい決め台詞を作らない。読者を信頼し、過剰な手取り足取り・正当化・前置きをしない。
- 採点軸(各1-10、合計35/50未満なら直す): 直接性 / リズム / 信頼 / 真正性(人間らしさ) / 密度(削れる所は削る)。`;
const TASTE_RULES =
`# デザインの審美ルール(出典: Leonxlnx/taste-skill)

  const aiWeight = aiTerms.reduce((sum,term)=>sum + (term.length >= 5 ? 1.15 : 0.75), 0);
  const humanWeight = humanTerms.reduce((sum,term)=>sum + (term.length >= 5 ? 1.15 : 0.85), 0);
  const corpusSignal = aiWeight / Math.max(aiWeight + humanWeight + 1.0, 1);
  const slopSignal = Math.min((slopHits.length + emdash*1.2) / Math.max(sentences.length*0.9, 1), 1);
  const passiveSignal = Math.min(passiveCount / Math.max(sentences.length*0.18, 1), 1);
  const formalSignal = Math.min(formalCount / Math.max(sentences.length*0.35, 1), 1);
  const personalSignal = Math.max(0, 1 - (personalCount + hedgeCount) / Math.max(sentences.length*0.65, 1));
  const rhythmSignal = sentences.length >= 4 ? Math.max(0, 1 - sf.cv / 0.42) : 0.35;
  const endMonoSignal = Math.max(0, 1 - sf.endDiversity);
  const lexSignal = Math.max(0, 1 - tok.ttr / 0.76);
  const abstractSignal = Math.min(abstractCount / Math.max(sentences.length*1.15, 1), 1);
  const deicticSignal = Math.max(0, 1 - deicticCount / Math.max(sentences.length*0.28, 1));
  const connectorSignal = Math.min(connectorCount / Math.max(sentences.length*0.55, 1), 1);
  const listSignal = Math.min(listCount / 3, 1);
  const rhetQSignal = Math.max(0, 1 - rhetQCount / Math.max(sentences.length*0.2, 0.8));
  const openingSignal = hasAiOpening ? 0.9 : 0.1;
  const katakanaSignal = Math.min(katakanaCount / Math.max(sentences.length*0.75, 1), 1);
  const weights = {
    corpus:.20, slop:.12, passive:.08, formal:.09, personal:.09, rhythm:.07, endMono:.04,
    lex:.04, abstract:.06, deictic:.04, connector:.07, list:.05, rhetQ:.04, opening:.05, katakana:.06
  };
  const raw =
    corpusSignal*weights.corpus + slopSignal*weights.slop + passiveSignal*weights.passive +
    formalSignal*weights.formal + personalSignal*weights.personal + rhythmSignal*weights.rhythm +
    endMonoSignal*weights.endMono + lexSignal*weights.lex + abstractSignal*weights.abstract +
    deicticSignal*weights.deictic + connectorSignal*weights.connector + listSignal*weights.list +
    rhetQSignal*weights.rhetQ + openingSignal*weights.opening + katakanaSignal*weights.katakana;
  let ai = Math.round(writerSigmoid(raw, 0.39, 7.8) * 100);
  if (t.length < 80) ai = Math.round(ai*0.72 + Math.min(55, (slopHits.length + aiTerms.length)*8)*0.28);
  const habit = writerHabitAdjustment(t);
  ai = writerClamp(ai + habit.shift, 1, 99);
  if (habit.exact === "human") ai = Math.min(ai, 28);
  else if (habit.exact === "ai") ai = Math.max(ai, 72);
  else if (habit.exact === "mixed") ai = writerClamp(ai, 42, 56);
  ai = writerClamp(ai, 1, 99);
  const confidence = Math.round(writerClamp(34 + Math.log(Math.max(t.length,1))*7 + sentences.length*3, 30, 96));
  const tooShort = t.length < 80 || sentences.length < 2;
  const verdict = (tooShort || confidence < 48) ? "短文・保留" : ai >= 58 ? "AI寄り" : ai <= 35 ? "人間寄り" : "混合・要確認";
  const sentScores = sentences.map((s,i)=>({ idx:i, sent:s, score:writerSentenceScore(s) }));
  const decomp = [
    { label:"AI語彙類似", val:Math.round(corpusSignal*100), weight:weights.corpus, tone:"ai" },
    { label:"定型/副詞", val:Math.round(slopSignal*100), weight:weights.slop, tone:"ai" },
    { label:"受け身", val:Math.round(passiveSignal*100), weight:weights.passive, tone:"tone" },
    { label:"形式的述語", val:Math.round(formalSignal*100), weight:weights.formal, tone:"tone" },
    { label:"主観欠如", val:Math.round(personalSignal*100), weight:weights.personal, tone:"ai" },
    { label:"文長均一", val:Math.round(rhythmSignal*100), weight:weights.rhythm, tone:"tone" },
    { label:"抽象語密度", val:Math.round(abstractSignal*100), weight:weights.abstract, tone:"ai" },
    { label:"接続詞過多", val:Math.round(connectorSignal*100), weight:weights.connector, tone:"ai" },
    { label:"具体語欠如", val:Math.round(deicticSignal*100), weight:weights.deictic, tone:"tone" },
    { label:"カタカナ率", val:Math.round(katakanaSignal*100), weight:weights.katakana, tone:"tone" },
    { label:"癖補正", val:habit.shift, weight:0, tone:habit.shift>0?"ai":habit.shift<0?"human":"tone" }
  ];
  const notes = [];
  if (aiTerms.length) notes.push(`AI語彙 ${aiTerms.length}件`);
  if (slopHits.length) {
    const byCat={}; slopHits.forEach(h=>{ byCat[h.cat]=(byCat[h.cat]||0)+1; });
    Object.entries(byCat).slice(0,5).forEach(([c,n])=>notes.push(`${c} ${n}件`));
  }
  if (passiveCount) notes.push(`受け身 ${passiveCount}件`);
  if (formalCount) notes.push(`形式的述語 ${formalCount}件`);
  if (connectorCount >= 2) notes.push(`接続詞 ${connectorCount}件`);
  if (sentences.length >= 4 && rhythmSignal > .55) notes.push("文の長さが均一");
  if (humanTerms.length) notes.push(`人間味シグナル ${humanTerms.length}件`);
  if (habit.exact) notes.push(`既知サンプル: ${habit.exact==="human"?"人間文":habit.exact==="ai"?"AI文":"混合"}`);
  if (habit.shift) notes.push(`癖補正 ${habit.shift>0?"+":""}${habit.shift}`);
  if (confidence < 55) notes.push("短文のため信頼度低め");
  const evidence = [];
  sentScores.filter(s=>s.score>=62).slice(0,4).forEach(s=>evidence.push({ type:"ai", label:"文別AI度", reason:`「${s.sent.slice(0,34)}${s.sent.length>34?"…":""}」が ${s.score}%`, sentIdx:s.idx }));
  if (aiTerms.length) evidence.push({ type:"ai", label:"AI語彙", reason:aiTerms.slice(0,8).join("、"), sentIdx:0 });
  if (slopHits.length) evidence.push({ type:"ai", label:"定型表現", reason:slopHits.slice(0,8).map(h=>h.text).join("、"), sentIdx:0 });
  if (passiveCount || formalCount) evidence.push({ type:"tone", label:"説明文調", reason:`受け身 ${passiveCount}件 / 形式的述語 ${formalCount}件`, sentIdx:0 });
  if (connectorCount >= 2 || listCount >= 2) evidence.push({ type:"tone", label:"構成が整いすぎ", reason:`接続詞 ${connectorCount}件 / 列挙 ${listCount}件`, sentIdx:0 });
  if (personalCount + hedgeCount === 0 && sentences.length >= 2) evidence.push({ type:"ai", label:"書き手の視点なし", reason:"私・自分・思う・かもしれない等の揺れが見当たりません", sentIdx:0 });
  if (humanTerms.length) evidence.push({ type:"human", label:"人間味シグナル", reason:humanTerms.slice(0,8).join("、"), sentIdx:0 });
  if (habit.exact) evidence.push({ type:habit.exact==="ai"?"ai":habit.exact==="human"?"human":"tone", label:"フィードバック正解を優先", reason:`同一文章は過去に「${habit.exact==="human"?"人間文":habit.exact==="ai"?"AI文":"混合"}」として登録されています`, sentIdx:0 });
  if (habit.shift) evidence.push({ type:habit.shift>0?"ai":"human", label:"癖プロファイル反映", reason:`${habit.shift>0?"AI寄り":"人間寄り"}に ${Math.abs(habit.shift)} 補正: ${habit.matched.join("、")}`, sentIdx:0 });
  if (confidence < 55) evidence.push({ type:"tone", label:"判定保留", reason:"短文は誤判定しやすいため、長めの本文で再判定してください", sentIdx:0 });
  if (!evidence.length) evidence.push({ type:"human", label:"強いAI痕跡なし", reason:"定型語・構文・リズムの偏りは小さめです", sentIdx:0 });
  const hits = slopHits.concat(aiTerms.slice(0,30).map(term=>({ cat:"AI語彙", text:term })));
  return { ai, human:100-ai, hits:hits.slice(0,80), notes, evidence, sentScores, decomp, metrics:{
    verdict, confidence, unnatural:Math.round(writerSigmoid((rhythmSignal+endMonoSignal+passiveSignal+formalSignal+connectorSignal)/5, .42, 7)*100),
    fluctuation:Math.round(writerClamp((1-rhythmSignal)*35 + (1-endMonoSignal)*22 + tok.ttr*20 + (personalCount+hedgeCount)*7 + deicticCount*5, 0, 100)),
    aiTerms:aiTerms.length, humanTerms:humanTerms.length, passiveCount, formalCount, connectorCount, listCount, abstractCount,
    habitShift:habit.shift, habitMatched:habit.matched, habitConfidence:habit.confidence, habitExact:habit.exact,
    sentences:sentences.length, chars:t.length, ttr:tok.ttr, raw:Math.round(raw*100), engine:"多軸ローカル解析"
  } };
}

/* ---------- 会話ループ(RAG・ツール・検索・画像) ---------- */
let busy = false;
let pendingImage = null;   // {mime, data(base64)} マルチモーダル添付(Gemini)
let _ragInject = "";        // 今ターンのRAG注入文(systemPromptが参照)
async function ask(userText){
  if (busy) return;
  history.push({ role:"user", content:userText }); saveHist();
  add(userText, "me");
  voice.stop(); face.setEmotion("thinking");
  busy = true; $("#send").style.display="none"; $("#stop").style.display="";
  const node = add("…", "ai"); const span = node.firstChild;
  let lastNode = node, lastSpan = span;
  // 蒸留エージェントの即答キャッシュ(同じ質問は無料・ゼロ遅延で返す)
  const _ag = activeAgent();
  const _ck = _ag ? cacheKey(_ag, userText) : null;
  if (_ck && agentCache[_ck]) {
    const cached = agentCache[_ck];
    span.textContent = emojify(cached);
    history.push({ role:"assistant", content: cached }); saveHist();
    attachFeedback(node, cached); node.dataset.cached = "1";
    try { face.setEmotion("happy"); voice.speak(cached); } catch(e){}
    busy = false; $("#send").style.display=""; $("#stop").style.display="none";
    return;
  }
  const img = pendingImage; pendingImage = null;   // 今ターンの画像添付(消費)
  if (img) { try{ updateAttachUI(); }catch(e){} }
  const stripDir = (t)=> (t||"").replace(/\(\((?:SEARCH|TOOL):[\s\S]*?\)\)/gi, "").trim();
  const DIRECTIVE = /\(\(\s*(SEARCH|TOOL)\s*:\s*([\s\S]+?)\)\)/i;
  try {
    _ragInject = CFG.rag ? await retrieveContext(userText) : "";   // ① 関連メモリだけを動的に注入
    let msgs = buildMessages();
    let resp = await streamLLM(systemPrompt(), msgs, (full)=>{ span.textContent = stripDir(full) || "…"; logEl.scrollTop=logEl.scrollHeight; }, { image: img });
    // ② ツール/検索エージェント(最大3回)
    let rounds = 0;
    while ((CFG.web || CFG.tools) && DIRECTIVE.test(resp) && rounds < 3) {
      rounds++;
      const m = resp.match(DIRECTIVE); const kind = m[1].toUpperCase(); let label, result;
      if (kind === "SEARCH") { if(!CFG.web){ break; } const q=m[2].trim(); label=`🔎 検索: ${q}`; result = await webSearch(q); }
      else { if(!CFG.tools){ break; } const parts=m[2].split("|"); const name=(parts[0]||"").trim(); const input=parts.slice(1).join("|").trim(); label=`🛠 ツール: ${name}（${input}）`; result = await runTool(name, input); }
      add(label, "tool");
      add("📄 " + String(result).slice(0, 280) + (String(result).length>280?"…":""), "tool");
      msgs = msgs.concat([{ role:"assistant", content: resp }, { role:"user", content:`[ツール結果]\n${result}\n\n上の結果に書かれていることだけを根拠に、最初の質問へ日本語で答えてください。結果に答えが無ければ「確かな情報は見つかりませんでした」と正直に言い、数字・固有名詞・日付・URLを創作しないでください。((SEARCH))や((TOOL))はもう使いません。` }]);
      const node2 = add("…", "ai"); lastNode = node2; lastSpan = node2.firstChild;
      resp = await streamLLM(systemPrompt(), msgs, (full)=>{ lastSpan.textContent = stripDir(full)||"…"; logEl.scrollTop=logEl.scrollHeight; });
      lastSpan.textContent = stripDir(resp);
    }
    const finalText = stripDir(resp);
    if (lastNode === node) span.textContent = emojify(finalText); else { node.remove(); lastSpan.textContent = emojify(finalText); }
    if (_ck && rounds === 0 && finalText && !img) { agentCache[_ck] = finalText; saveAgentCache(); }   // 検索/画像を使わなかった専門回答だけキャッシュ
    history.push({ role:"assistant", content: finalText }); saveHist();
    attachFeedback(lastNode, finalText);
    { const m=detectEmotion(finalText); if(m==="love"||m==="joyful") face.addAffection(1.2); else if(m==="happy"||m==="excited") face.addAffection(0.6); else face.addAffection(0.2); }   // 会話を重ねると少しずつ好感度↑
    voice.speak(finalText);
    if (++turnsSinceLearn >= 6) { turnsSinceLearn = 0; learnFromConversation(); }
  } catch (e) {
    if (lastNode !== node) node.remove();
    lastSpan.textContent = "⚠ エラー: " + e.message + (e.message.includes("APIキー")?"":"  (⚙設定でプロバイダ/キー/モデルを確認してください)");
    face.setEmotion("idle");
  }
  _ragInject = "";   // 次ターンへ持ち越さない
  busy = false; $("#send").style.display=""; $("#stop").style.display="none";
}

/* ---------- 🤖 文章AI判定(stop-slop) ---------- */
function writerTone(r){
  const v = r.metrics && r.metrics.verdict || "";
  return v.includes("AI") ? "ai" : v.includes("人間") ? "human" : "mixed";
}
function writerScoreColor(v){
  return v >= 58 ? "#ff8a8a" : v <= 35 ? "#78dfae" : "#ffd086";
}
function writerReport(text, r){
  const survey = writerSurveySummary();
  return `AUTONOMA 文章チェッカー判定レポート
==============================
AIっぽさ: ${r.ai}/100
人間味: ${r.human}/100
総合判定: ${r.metrics.verdict}
信頼度: ${r.metrics.confidence}%

function wireWriterResultActions(text, r){
  const rerender = (msg)=>{
    const fresh = slopScan(text);
    const out = $("#wChkOut");
    if (out) {
      out.innerHTML = renderWriterResult(fresh, text, msg);
      wireWriterResultActions(text, fresh);
    }
  };
  document.querySelectorAll("[data-wlearn]").forEach(btn=>{
    btn.onclick = ()=>{
      const expected = btn.dataset.wlearn;
      const res = writerLearnFrom(text, expected);
      rerender(`${expected==="ai"?"AI文":"人間文"}として学習し、癖補正を即反映して再判定しました。追加語 ${res.added}件 / 癖タグ ${res.traits.length}件`);
    };
  });
  const surveySave = $("#wSurveySave"), surveyOnly = $("#wSurveyOnly");
  const saveSurvey = (rejudge)=>{
    const picked = document.querySelector('input[name="wTruth"]:checked')?.value || "hold";
    if (picked === "hold") { const msg=$("#wLearnMsg"); if(msg) msg.textContent="保留として扱いました。学習は行っていません。"; return; }
    writerSurveyState.auto = $("#wSurveyAuto") ? $("#wSurveyAuto").checked : true;
    const traits = [...document.querySelectorAll("[data-wtrait]:checked")].map(x=>x.dataset.wtrait);
    const memo = $("#wSurveyMemo") ? $("#wSurveyMemo").value : "";
    const res = writerLearnFrom(text, picked, { traits, memo, learnHabit:true });
    const label = picked==="ai"?"AI文":picked==="human"?"人間文":"混合";
    if (rejudge) rerender(`${label}としてフィードバック学習し、癖補正を即反映して再判定しました。追加語 ${res.added}件 / 癖タグ ${res.traits.length}件`);
    else { const msg=$("#wLearnMsg"); if(msg) msg.textContent = `${label}として保存しました。次回判定から癖補正に反映します。`; }
  };
  if (surveySave) surveySave.onclick = ()=>saveSurvey(true);
  if (surveyOnly) surveyOnly.onclick = ()=>saveSurvey(false);
  const rep = $("#wReportBtn");
  if (rep) rep.onclick = ()=>{
    const box = $("#wReportBox");
    if (!box) return;
    box.style.display = box.style.display === "none" ? "" : "none";
    box.textContent = writerReport(text, r);
  };
}

${tacticLines}

具体例:
${s.examples.slice(0,6).map(x=>`- ${x}`).join("\n")}

${s.states.map(x=>`- ${x}`).join("\n")}

    const btn=$("#agDistill"); btn.disabled=true; st.innerHTML='🧪 蒸留中…(専門家の脳を設計し、Webで最新情報を学習しています)';

const VOICE_PRESETS = [

];
const face = (function(){
  const cv = $("#face"), moodEl = $("#mood");
  let mood = "idle", emo = MOODS.idle;
  let speaking=false, speakEnv=0;
  let blink=0, nextBlink=0;
  const gaze={x:0,y:0,tx:0,ty:0,next:0};
  const cur={ brow:0, curve:0.02, eye:1, open:0, lr:0.35, lg:0.52, lb:0.9 };
  let head=null;                                   // 後で生成(フォールバック時はnull)
  let aff=(CFG.affection!=null?CFG.affection:50);  // 好感度0..100
  const grab={ on:false, tx:0, ty:0, x:0, y:0, vx:0, vy:0 };   // つまむ(ばね)
  const affEl=$("#aff"), pokeLines={ tap:["なあに?😊","ん?どうしたの🙂","呼んだ?😄","えへへ☺"], drag:["ふふっ、くすぐったいよ〜😊","わっ、びっくりした!😮","もう、いたずらっ子だなあ😄","やさし〜く、ね💕"] };
  function affColorOf(a){
    const st=[[0,[90,100,150]],[40,[58,107,216]],[64,[43,192,192]],[82,[57,211,106]],[92,[255,207,74]],[100,[255,127,176]]];   // 青→水色→緑→金→ピンク(常に鮮やか)
    let lo=st[0],hi=st[st.length-1];
    for(let i=0;i<st.length-1;i++){ if(a>=st[i][0]&&a<=st[i+1][0]){ lo=st[i];hi=st[i+1];break; } }
    const t=(a-lo[0])/((hi[0]-lo[0])||1), L=lo[1],H=hi[1];
    return [L[0]+(H[0]-L[0])*t, L[1]+(H[1]-L[1])*t, L[2]+(H[2]-L[2])*t];
  }
  function applyAff(){ const c=affColorOf(aff); if(head) head.material.color.setRGB(c[0]/255,c[1]/255,c[2]/255); if(affEl) affEl.textContent="♥ "+Math.round(aff); }
  function setAffection(v){ aff=Math.max(0,Math.min(100,v)); CFG.affection=aff; saveCfg(); applyAff(); }
  function addAffection(d){ setAffection(aff+d); }
  function setGrab(nx,ny){ grab.on=true; grab.tx=nx; grab.ty=ny; }
  function endGrab(){ grab.on=false; grab.tx=0; grab.ty=0; }
  function poked(wasDrag){ addAffection(wasDrag?2:1); setEmotion(aff>70?"love":"happy"); const a=pokeLines[wasDrag?"drag":"tap"]; return a[Math.floor(Math.random()*a.length)]; }

  function showMood(){
    if(moodEl){ moodEl.textContent=emo.emoji; moodEl.classList.remove("pop"); void moodEl.offsetWidth; moodEl.classList.add("pop"); }
    if(cv){ const c=emo.color, r=(c>>16)&255,g=(c>>8)&255,b=c&255; cv.parentElement.style.boxShadow=`inset 0 70px 120px -55px rgba(${r},${g},${b},.32)`; }
  }
  function setEmotion(k){ if(!MOODS[k]) k="idle"; if(k===mood) return; mood=k; emo=MOODS[k]; showMood(); }
  function setSpeaking(on){ speaking=on; }
  function pulse(){ speakEnv=1; }

  const T = window.THREE;
  if(!T || !cv){ showMood(); return { setEmotion, setSpeaking, pulse, mood:()=>mood, setAffection, addAffection, setGrab, endGrab, poked, affection:()=>aff, is3D:false }; }

  let renderer;
  try { renderer = new T.WebGLRenderer({ canvas:cv, alpha:true, antialias:true }); }
  catch(e){ console.warn("WebGL不可・絵文字のみ:", e.message); showMood(); return { setEmotion, setSpeaking, pulse, mood:()=>mood, setAffection, addAffection, setGrab, endGrab, poked, affection:()=>aff, is3D:false }; }
  renderer.setClearColor(0x000000, 0);
  if(T.ACESFilmicToneMapping){ renderer.toneMapping=T.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0; }

  const scene=new T.Scene();
  const cam=new T.PerspectiveCamera(38,1,0.1,100); cam.position.set(0,0,6.2);
  scene.add(new T.AmbientLight(0x5a6594, 0.7));
  const key=new T.DirectionalLight(0xffffff,0.7); key.position.set(-2,3,5); scene.add(key);
  const rim=new T.DirectionalLight(0xa9c2ff,0.45); rim.position.set(3,-1,-4); scene.add(rim);
  const moodLight=new T.PointLight(0x5b86e5,1.3,30); moodLight.position.set(2.0,1.4,3.8); scene.add(moodLight);

  const headGrp=new T.Group(); scene.add(headGrp);
  // まるくて柔らかい頭(マット)
  head=new T.Mesh(new T.SphereGeometry(1.5,64,48),
    new T.MeshStandardMaterial({ color:0x5470c4, roughness:0.66, metalness:0.04, emissive:0x1a2240, emissiveIntensity:0.3 }));
  head.scale.set(1.04,1.03,0.97); headGrp.add(head);

  // 目(スクショ準拠: シンプルな黒い瞳のみ)
  const eyeMat=new T.MeshStandardMaterial({ color:0x10131f, roughness:0.32, metalness:0.0 });
  const eyes=[];
  for(const sx of [-1,1]){
    const eg=new T.Group(); eg.position.set(sx*0.5,0.12,1.36);   // 前面に出して埋もれないように
    const e=new T.Mesh(new T.SphereGeometry(0.26,28,22), eyeMat); e.scale.set(0.9,1.2,0.6); eg.add(e);
    headGrp.add(eg); eyes.push({eg,sx});
  }
  // 眉(細く・強い感情のときだけ)
  const browMat=new T.MeshStandardMaterial({ color:0x2a3350, roughness:0.7 });
  const brows=[];
  for(const sx of [-1,1]){ const b=new T.Mesh(new T.BoxGeometry(0.38,0.05,0.1), browMat); b.position.set(sx*0.5,0.74,1.28); b.visible=false; headGrp.add(b); brows.push({b,sx}); }
  // 口(😊風の上向きカーブの笑顔＋発話時に開く口内)
  const mouthGrp=new T.Group(); mouthGrp.position.set(0,-0.46,1.30); headGrp.add(mouthGrp);
  const inner=new T.Mesh(new T.SphereGeometry(0.2,24,18), new T.MeshStandardMaterial({color:0x402a36, roughness:0.5})); inner.scale.set(1,0.06,0.45); mouthGrp.add(inner);
  const smileCurve=new T.QuadraticBezierCurve3(new T.Vector3(-0.24,0.07,0.06), new T.Vector3(0,-0.10,0.12), new T.Vector3(0.24,0.07,0.06));
  const smile=new T.Mesh(new T.TubeGeometry(smileCurve,20,0.05,8,false), new T.MeshStandardMaterial({color:0x2a1f2b, roughness:0.5}));
  mouthGrp.add(smile);
  // 思考パーティクル
  const dots=new T.Group(); dots.position.set(0,1.95,0.6); headGrp.add(dots);
  for(let i=0;i<3;i++){ const d=new T.Mesh(new T.SphereGeometry(0.07,12,10), new T.MeshBasicMaterial({color:0x9fb4e6, transparent:true, opacity:0.9})); d.position.x=(i-1)*0.28; dots.add(d); }

  function resize(){ const w=cv.clientWidth||170; renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1)); renderer.setSize(w,w,false); cam.aspect=1; cam.updateProjectionMatrix(); }
  resize(); window.addEventListener("resize", resize);
  showMood(); applyAff();

  const t0=performance.now();
  function frame(now){
    const t=(now-t0)/1000;
    if(now>nextBlink){ blink=1; nextBlink=now+2200+Math.random()*3400; }
    blink=Math.max(0,blink-0.16);
    if(now>gaze.next){ gaze.tx=(Math.random()*2-1)*0.5; gaze.ty=(Math.random()*2-1)*0.35; gaze.next=now+800+Math.random()*1900; }
    gaze.x+=(gaze.tx-gaze.x)*0.06; gaze.y+=(gaze.ty-gaze.y)*0.06;
    cur.brow+=(emo.brow-cur.brow)*0.12; cur.curve+=(emo.curve-cur.curve)*0.12; cur.eye+=(emo.eye-cur.eye)*0.12;
    speakEnv*=0.86;
    let openTgt=emo.openBase||0;
    if(speaking){ const osc=0.5+0.5*Math.sin(t*15+Math.sin(t*7)*1.5); openTgt=0.12+osc*0.5*(0.5+0.5*speakEnv)+Math.random()*0.05; }
    cur.open+=(openTgt-cur.open)*0.4;
    const breath=Math.sin(t*1.7)*0.5+0.5;
    // つまむ(ばね・離すとぷるんと戻る)
    grab.vx+=((grab.on?grab.tx:0)-grab.x)*0.5; grab.vx*=0.62; grab.x+=grab.vx;
    grab.vy+=((grab.on?grab.ty:0)-grab.y)*0.5; grab.vy*=0.62; grab.y+=grab.vy;
    const gm=Math.hypot(grab.x,grab.y), bs=1+breath*0.012;
    headGrp.scale.set(bs*(1+grab.x*0.12), bs*(1-gm*0.08+grab.y*0.06), bs*(1-gm*0.04));
    headGrp.position.x=grab.x*0.5; headGrp.position.y=grab.y*0.5;
    headGrp.rotation.y=gaze.x*0.18+grab.x*0.22+Math.sin(t*0.6)*0.05;
    headGrp.rotation.x=-gaze.y*0.12-grab.y*0.18+Math.sin(t*0.9)*0.02;
    const lid=1-blink;
    eyes.forEach(({eg,sx})=>{ eg.scale.y=Math.max(0.06,cur.eye*lid); eg.position.x=sx*0.5+gaze.x*0.06; eg.position.y=0.12+gaze.y*0.05; });
    brows.forEach(({b,sx})=>{ b.visible=cur.brow>0.07; b.position.y=0.78-cur.brow*0.4; b.rotation.z=-sx*cur.brow*1.1; });
    // 口: 感情で笑顔カーブ(上向き=笑顔/下向き=困り)＋発話で口内が開く

/* ---------- 声(Web Speech・無料) ---------- */
function detectEmotion(s){
  if(!s) return "idle";
  // 1) 応答中の絵文字を最優先で気分に対応(全種類対応)
  const emojiMap = [
    [/🤩|🥳|🔥/, "excited"], [/😍|🥰|💖|❤|♥/, "love"],
    [/😄|😆|😁|😹|🎉/, "joyful"], [/😊|🙂|😃|☺|😌|👍/, "happy"],
    [/😎/, "cool"], [/🤔|🧐/, "thinking"], [/🤨|🙃/, "curious"],
    [/😮|😲|😯|😵|‼|⁉/, "surprised"], [/😟|😥|😓|💦|😬/, "worried"],
    [/😢|😭|😞|💔/, "sad"], [/😴|💤|🥱/, "sleepy"],
  ];
  for(const [re,k] of emojiMap){ if(re.test(s)) return k; }
  // 2) 日本語キーワード
  if(/うれし|嬉し|やった|わー|最高|大好き|うわ.*すご/.test(s)) return "joyful";
  if(/よかった|ありがと|楽し|いいですね|素敵|助か|うれ/.test(s)) return "happy";
  if(/びっくり|驚|まさか|なんと/.test(s)) return "surprised";
  if(/ごめん|申し訳|残念|悲し|つら/.test(s)) return "sad";
  if(/心配|不安|大丈夫かな|うーん/.test(s)) return "worried";
  if(/考え|検討|うーむ|なるほど|つまり/.test(s)) return "thinking";
  if(/[?？]/.test(s)) return "curious";
  return "idle";
}

/* /speakers(VOICEVOX/AivisSpeech) → /v1/speakers(COEIROINK) の順で話者一覧 */
async function vvProbe(base, ms=3000){

/* no-cors で「サーバが居るか」だけ確認(CORSで本文が読めなくても応答すれば在と判定) */
async function vvReachable(base, ms=2500){
  base=base.replace(/\/$/,"");

    const c=new AbortController(); const to=setTimeout(()=>{ try{c.abort();}catch(_){}}, ms);

    catch(e){ clearTimeout(to); }
  }
  return false;
}

async function vvAutoConnect(opts={}){

    const ids=new Set(vvSpeakerCache.map(s=>s.id));
    if(!CFG.vvSpeaker || !ids.has(String(CFG.vvSpeaker))) CFG.vvSpeaker = vvSpeakerCache[0].id;
    if(CFG.vvSpeakerCalm && !ids.has(String(CFG.vvSpeakerCalm))) CFG.vvSpeakerCalm="";

    if(has(["yang","saya","tidak","dengan","untuk","adalah","ini","itu","terima"])) return "id";
    if(has(["het","een","niet","voor","dat","hoe","ik","jij","bedankt"])) return "nl";
    if(has(["och","är","det","att","inte","jag","med","för","hej","tack"])) return "sv";
    if(has(["bir","için","değil","ben","sen","ile","çok","merhaba","nasıl","teşekkür"])) return "tr";
    return "en";
  }
  function detectLang(s){
    if(/[぀-ヿ]/.test(s)) return "ja";
    if(/[가-힣]/.test(s)) return "ko";
    if(/[฀-๿]/.test(s)) return "th";
    if(/[؀-ۿ]/.test(s)) return "ar";
    if(/[ऀ-ॿ]/.test(s)) return "hi";
    if(/[Ѐ-ӿ]/.test(s)) return /[іїєґ]/i.test(s) ? "uk" : "ru";
    if(/[一-鿿]/.test(s)) return "zh";
    if(/[a-zA-Zà-ÿ]/.test(s)) return detectLatin(s);
    return "ja";
  }
  function segmentByLang(clean){
    const parts=splitParts(clean), segs=[];
    for(const part of parts){
      const lang=detectLang(part), last=segs[segs.length-1];
      if(last && last.lang===lang) last.text += (lang==="ja"?"":" ")+part;
      else segs.push({ lang, text:part });
    }
    return segs.length ? segs : [{ lang:detectLang(clean), text:clean }];
  }
  function pickVoice(bcp){
    if(!synth) return null;
    const vs=synth.getVoices(), code=bcp.slice(0,2).toLowerCase();
    return vs.find(v=>v.lang && v.lang.toLowerCase()===bcp.toLowerCase())
        || vs.find(v=>v.lang && v.lang.toLowerCase().startsWith(code)) || null;
  }
  const ttsCleanLite=(s)=> stripEmoji(s).replace(/[*_~#^`|<>\[\]{}]/g," ").replace(/\s{2,}/g," ").trim();
  /* Web Speech(日本語=プリセット声 / 他言語=ネイティブ声)。Promiseで順次再生 */
  function webSpeakP(clean, bcp, calm){
    return new Promise((resolve)=>{
      if(!synth){ resolve(); return; }
      const ja=bcp.startsWith("ja");
      const parts=splitParts(clean).map(t=> ja?ttsNormalize(t):ttsCleanLite(t)).filter(Boolean);
      if(!parts.length){ resolve(); return; }
      const my=++seq; face.setSpeaking(true);
      const v=pickVoice(bcp), pr=VOICE_PRESETS[CFG.voicePreset]||VOICE_PRESETS[0]; let i=0;
      const next=()=>{
        if(my!==seq){ resolve(); return; }
        if(i>=parts.length){ resolve(); return; }
        const u=new SpeechSynthesisUtterance(parts[i++]);
        if(v) u.voice=v; u.lang=v?v.lang:bcp;
        if(ja){ u.rate=calm?0.98:pr.rate; u.pitch=calm?0.8:pr.pitch; } else { u.rate=1.0; u.pitch=1.05; }
        u.onboundary=()=>face.pulse(); u.onend=next; u.onerror=next;
        try{ synth.speak(u); }catch(e){ next(); }
      };
      next();
    });
  }
  function speakJaP(clean, style){
    if(CFG.ttsMode==="irodori" && CFG.ttsUrl) return speakIrodori(clean, style);
    if(CFG.ttsMode==="voicevox") return speakVoicevox(clean, style);
    return webSpeakP(clean, "ja-JP", style==="calm");
  }
  async function runSegments(segs, style, gen){
    for(const seg of segs){
      if(gen!==speakGen) return;
      if(seg.lang==="ja") await speakJaP(seg.text, style);
      else await webSpeakP(seg.text, LANG_BCP[seg.lang]||seg.lang, false);   // 他言語はネイティブ発音
    }
    if(gen===speakGen){ face.setSpeaking(false); face.setEmotion("idle"); }
  }
  function speak(text){
    const clean=(text||"").replace(/\(\(SEARCH:.*?\)\)/g,"").replace(/[*_`#>]/g,"").trim();
    face.setEmotion(detectEmotion(clean));
    if(!on || !clean){ clearTimeout(revertT); revertT=setTimeout(()=>face.setEmotion("idle"),2400); return; }
    stop();
    const gen=++speakGen;
    runSegments(segmentByLang(clean), styleFor(clean), gen);
  }
  function toggle(){ on=!on; CFG.voice=on; saveCfg(); if(!on) stop(); return on; }
  return { speak, stop, toggle, isOn:()=>on, styleFor, ttsNormalize, detectLang, segmentByLang };
})();
$("#voiceBtn").onclick = ()=>{ const on=voice.toggle(); $("#voiceBtn").textContent = `🔊 声: ${on?"ON":"OFF"}`; };
/* 顔を「つまむ/つつく」: ドラッグで引っぱる・離すとぷるん。好感度が上がりリアクション */
(function(){
  const cv=$("#face"); if(!cv) return;
  let pid=null, dx0=0, dy0=0, moved=false;
  const norm=(e)=>{ const r=cv.getBoundingClientRect(); return [((e.clientX-r.left)/r.width)*2-1, -(((e.clientY-r.top)/r.height)*2-1)]; };
  cv.addEventListener("pointerdown",(e)=>{ pid=e.pointerId; try{cv.setPointerCapture(pid);}catch(_){} const [nx,ny]=norm(e); dx0=nx;dy0=ny;moved=false; face.setGrab(nx,ny); });
  cv.addEventListener("pointermove",(e)=>{ if(e.pointerId!==pid) return; const [nx,ny]=norm(e); if(Math.hypot(nx-dx0,ny-dy0)>0.08) moved=true; face.setGrab(nx,ny); });
  const up=(e)=>{ if(pid===null||(e.pointerId!=null&&e.pointerId!==pid)) return; pid=null; face.endGrab(); const line=face.poked(moved); if(line) voice.speak(line); };
  cv.addEventListener("pointerup",up); cv.addEventListener("pointercancel",up); cv.addEventListener("pointerleave",up);
})();

/* ---------- 起動 ---------- */
$("#webBtn").textContent = `🌐 取り込み: ${CFG.web?"ON":"OFF"}`;
$("#voiceBtn").textContent = `🔊 声: ${CFG.voice!==false?"ON":"OFF"}`;
$("#emojiBtn").textContent = `🐴 絵文字: ${CFG.emoji!==false?"ON":"OFF"}`;
updateProvLabel();
updateAgentChip();   // 蒸留エージェントが稼働中なら表示
updateAIModeBtn();
learnWritingSkills();   // stop-slop / taste-skill をRAG知識へ学習(初回のみ)
if (CFG.clearOnLoad) { history=[]; saveHist(); }   // 起動時に会話履歴を消去(設定)
renderHistory();
scheduleIngest();
fetchCloudFeed();
/* 起動時: ローカルTTS(AivisSpeech/VOICEVOX)を自動検出して接続 */
(async ()=>{ try{ if(CFG.vvAuto!==false && CFG.ttsMode==="voicevox"){ vvBadge(); vvAutoConnectLoop(); } }catch(e){} })();
const DEBUG_HOOK = false;
const publicCfg = ()=> {
  const copy = Object.assign({}, CFG);
  copy.apiKey = CFG.apiKey ? "(set)" : "";
  copy.ttsKey = CFG.ttsKey ? "(set)" : "";
  return copy;
};
if (DEBUG_HOOK) {
  window.__mind = Object.freeze({
    ask, webSearch, ingest, fetchCloudFeed, reflect, face, voice, detectEmotion, emojify,
    vvAutoConnect, vvProbe, vvReachable,
    get cfg(){ return publicCfg(); },
    get history(){ return history.slice(-10); },
    get worldMem(){ return worldMem.slice(-10); },
    get learned(){ return learned; },
    get agents(){ return agents.map(a=>({ id:a.id, name:a.name, specialty:a.specialty, created:a.created })); },
    exportAgents, importAgentsFromText, cloneAgent, sanitizeAgent,
    slopScan, designBriefScan, designProposalLocal, learnWritingSkills, SLOP_RULES, TASTE_RULES, curTemp
  });
} else {
  Object.defineProperty(window, "__mind", {
    value: Object.freeze({ secure:true, message:"Debug hook disabled." }),
    configurable:false,
    writable:false
  });
}
